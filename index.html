<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンガポール絶品グルメ＆出張ガイド</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Leaflet.js (地図表示用) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            background-color: #f8fafc;
        }
        #map {
            height: 450px;
            width: 100%;
            z-index: 10;
        }
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        /* 特別ピンのアニメーション */
        .pulse-pin {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- ヘッダーセクション -->
    <header class="bg-gradient-to-r from-slate-800 to-slate-900 text-white py-12 px-6 shadow-lg text-center relative overflow-hidden">
        <div class="relative z-10 max-w-4xl mx-auto">
            <span class="bg-rose-500 text-white text-sm font-bold tracking-wider py-1 px-3 rounded-full uppercase mb-4 inline-block">Business Trip & Gourmet Guide</span>
            <h1 class="text-3xl md:text-5xl font-black mb-4 leading-tight">シンガポール出張＆絶品グルメマップ</h1>
            <p class="text-lg opacity-90 font-medium">Aviation Festival Asia 2026 参加メンバー用</p>
        </div>
        <div class="absolute inset-0 opacity-5" style="background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'1\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- フィルター機能セクション -->
        <section class="mb-6">
            <div class="flex flex-wrap gap-2 justify-center" id="filter-buttons">
                <button class="filter-btn active px-4 py-2 rounded-full border border-slate-300 text-sm font-bold bg-slate-800 text-white shadow-sm transition-colors" data-category="all">🍽️ すべてのグルメ</button>
                <button class="filter-btn px-4 py-2 rounded-full border border-slate-300 text-sm font-bold bg-white text-slate-600 hover:bg-slate-50 shadow-sm transition-colors" data-category="ペーパーチキン">🍗 ペーパーチキン</button>
                <button class="filter-btn px-4 py-2 rounded-full border border-slate-300 text-sm font-bold bg-white text-slate-600 hover:bg-slate-50 shadow-sm transition-colors" data-category="ラクサ">🍜 ラクサ</button>
                <button class="filter-btn px-4 py-2 rounded-full border border-slate-300 text-sm font-bold bg-white text-slate-600 hover:bg-slate-50 shadow-sm transition-colors" data-category="バクテー">🍲 バクテー</button>
                <button class="filter-btn px-4 py-2 rounded-full border border-slate-300 text-sm font-bold bg-white text-slate-600 hover:bg-slate-50 shadow-sm transition-colors" data-category="チリクラブ">🦀 チリクラブ</button>
            </div>
        </section>

        <!-- 地図セクション -->
        <section class="mb-12 bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
            <div class="p-4 bg-slate-50 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        全体マップ
                    </h2>
                    <p class="text-xs text-slate-500 mt-1">紫が会場、緑がホテル、その他がお店です。ピンをタップで詳細表示。</p>
                </div>
                <!-- 凡例 -->
                <div class="flex gap-4 text-xs font-bold bg-white px-3 py-2 rounded-lg border border-slate-200">
                    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-indigo-600 inline-block"></span>会場</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-teal-600 inline-block"></span>ホテル</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-rose-500 inline-block"></span>お店</span>
                </div>
            </div>
            <div id="map"></div>
        </section>

        <!-- ガイド一覧セクション -->
        <section>
            <div class="flex items-center justify-between mb-4 border-b pb-2">
                <h2 class="text-2xl font-bold text-slate-800">お店ガイド</h2>
                <span class="text-sm text-slate-500 bg-slate-200 py-1 px-3 rounded-full font-bold">全10店舗</span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="restaurant-grid">
                <!-- JavaScriptでここにカードが生成されます -->
            </div>
        </section>
        
        <p class="text-center text-xs text-slate-400 mt-12 mb-6">予算は1SGD=約123円で計算した目安です。</p>
    </main>

    <!-- JavaScript ロジック -->
    <script>
        // ----------------------------------------------------
        // 1. データ定義 (拠点、店舗情報、座標)
        // ----------------------------------------------------
        
        // 出張の拠点データ (常に地図に表示)
        const basePlaces = [
            {
                id: "event",
                type: "event",
                name: "Aviation Festival Asia",
                desc: "出張のメイン目的（カンファレンス・展示会）",
                address: "Suntec Singapore Convention & Exhibition Centre",
                link: "https://www.google.com/maps/search/?api=1&query=Suntec+Singapore+Convention+and+Exhibition+Centre",
                lat: 1.2935,
                lng: 103.8572,
                color: "bg-indigo-600",
                iconEmoji: "🏢"
            },
            {
                id: "hotel_kawai",
                type: "hotel",
                name: "【滞在先】河合さん",
                desc: "Maxwell Reserve, Autograph Collection",
                address: "2 Cook Street",
                link: "https://www.google.com/maps/search/?api=1&query=Maxwell+Reserve+Singapore+Autograph+Collection",
                lat: 1.2783,
                lng: 103.8436,
                color: "bg-teal-600",
                iconEmoji: "🧳"
            },
            {
                id: "hotel_satake",
                type: "hotel",
                name: "【滞在先】佐竹さん",
                desc: "Hilton Garden Inn Singapore Serangoon",
                address: "3 Belilios Rd",
                link: "https://www.google.com/maps/search/?api=1&query=Hilton+Garden+Inn+Singapore+Serangoon",
                lat: 1.3069,
                lng: 103.8505,
                color: "bg-teal-600",
                iconEmoji: "🧳"
            },
            {
                id: "hotel_iwabuchi",
                type: "hotel",
                name: "【滞在先】岩淵さん",
                desc: "Holiday Inn Express Singapore Clarke Quay",
                address: "2 Magazine Road",
                link: "https://www.google.com/maps/search/?api=1&query=Holiday+Inn+Express+Singapore+Clarke+Quay",
                lat: 1.2885,
                lng: 103.8427,
                color: "bg-teal-600",
                iconEmoji: "🧳"
            }
        ];

        // グルメデータ (写真URLを削除)
        const places = [
            {
                id: 1, category: "ペーパーチキン", name: "Hillman Restaurant",
                desc: "日本人にも大人気！特製のタレに漬け込んだ鶏肉を紙で包んで揚げた、旨味たっぷりの王道ペーパーチキンです。",
                budget: "約3,000円 〜 5,000円", link: "https://www.google.com/maps/search/?api=1&query=Hillman+Restaurant+Kitchener+Road",
                rating: 4.1, reviews: 1540,
                lat: 1.3113, lng: 103.8580, color: "bg-amber-500"
            },
            {
                id: 2, category: "ペーパーチキン", name: "Manhill Restaurant",
                desc: "ヒルマンの姉妹店。少し中心部から離れますが、同じく絶品のペーパーチキンが落ち着いた雰囲気で味わえます。",
                budget: "約3,000円 〜 5,000円", link: "https://www.google.com/maps/search/?api=1&query=Manhill+Restaurant+Pasir+Panjang",
                rating: 4.0, reviews: 480,
                lat: 1.2825, lng: 103.7788, color: "bg-amber-500"
            },
            {
                id: 3, category: "ラクサ", name: "328 Katong Laksa",
                desc: "シンガポールラクサの代名詞的存在。ココナッツミルクの甘みと海鮮のダシ、スパイスのバランスが絶妙です。",
                budget: "約850円 〜 1,500円", link: "https://www.google.com/maps/search/?api=1&query=328+Katong+Laksa+East+Coast+Road",
                rating: 4.0, reviews: 3100,
                lat: 1.3053, lng: 103.9054, color: "bg-orange-500"
            },
            {
                id: 4, category: "ラクサ", name: "Sungei Road Laksa",
                desc: "炭火でスープを温め続ける昔ながらの屋台スタイル。ローカル感満載で、あっさりしつつもコクがあります。",
                budget: "約500円 〜 1,000円", link: "https://www.google.com/maps/search/?api=1&query=Sungei+Road+Laksa+Jalan+Berseh",
                rating: 4.3, reviews: 2200,
                lat: 1.3056, lng: 103.8562, color: "bg-orange-500"
            },
            {
                id: 5, category: "ラクサ", name: "Janggut Laksa",
                desc: "「オリジナル・カトンラクサ」を名乗る老舗。マイルドで奥深い味わいで、辛いのが少し苦手な方にもおすすめ。",
                budget: "約750円 〜 1,200円", link: "https://www.google.com/maps/search/?api=1&query=Janggut+Laksa+Queensway+Shopping+Centre",
                rating: 4.2, reviews: 850,
                lat: 1.2875, lng: 103.8034, color: "bg-orange-500"
            },
            {
                id: 6, category: "バクテー", name: "Song Fa Bak Kut Teh",
                desc: "ミシュラン・ビブグルマン常連の人気チェーン。胡椒がピリッと効いたクリアなスープはお代わり自由です！",
                budget: "約1,800円 〜 3,100円", link: "https://www.google.com/maps/search/?api=1&query=Song+Fa+Bak+Kut+Teh+New+Bridge+Road",
                rating: 4.4, reviews: 9500,
                lat: 1.2887, lng: 103.8468, color: "bg-yellow-600"
            },
            {
                id: 7, category: "バクテー", name: "Founder Bak Kut Teh",
                desc: "有名人もお忍びで通う老舗。柔らかい豚肉の旨味と胡椒の効いたスープがたまりません。",
                budget: "約1,800円 〜 3,100円", link: "https://www.google.com/maps/search/?api=1&query=Founder+Bak+Kut+Teh+Balestier+Road",
                rating: 4.0, reviews: 2600,
                lat: 1.3268, lng: 103.8530, color: "bg-yellow-600"
            },
            {
                id: 8, category: "バクテー", name: "Ng Ah Sio Bak Kut Teh",
                desc: "ニンニクと胡椒がガツンと効いた、濃いめでパンチのあるスープが好きな方に一押しのお店です。",
                budget: "約1,800円 〜 3,100円", link: "https://www.google.com/maps/search/?api=1&query=Ng+Ah+Sio+Bak+Kut+Teh+Rangoon+Road",
                rating: 4.0, reviews: 1900,
                lat: 1.3180, lng: 103.8504, color: "bg-yellow-600"
            },
            {
                id: 9, category: "チリクラブ", name: "JUMBO Seafood",
                desc: "チリクラブといえばココ！という超有名店。観光客にも入りやすく、王道の甘辛いソースが絶品です。",
                budget: "約9,800円 〜 18,500円", link: "https://www.google.com/maps/search/?api=1&query=JUMBO+Seafood+Riverside+Point",
                rating: 4.3, reviews: 7200,
                lat: 1.2894, lng: 103.8444, color: "bg-red-600"
            },
            {
                id: 10, category: "チリクラブ", name: "No Signboard Seafood",
                desc: "地元民にも愛される名店。チリクラブはもちろん、白胡椒を使ったマイルドな「ホワイトペッパークラブ」も人気。",
                budget: "約9,800円 〜 18,500円", link: "https://www.google.com/maps/search/?api=1&query=No+Signboard+Seafood+Geylang+Road",
                rating: 3.9, reviews: 1100,
                lat: 1.3130, lng: 103.8812, color: "bg-red-600"
            }
        ];

        // ----------------------------------------------------
        // 2. 地図の初期化とフィルターロジック
        // ----------------------------------------------------
        // シンガポール中心部に設定
        const map = L.map('map').setView([1.2935, 103.84], 13);

        // クリーンな観光向けデザインのタイルレイヤーを使用 (CartoDB Voyager)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // マーカーを管理するレイヤーグループ
        const markerLayerGroup = L.layerGroup().addTo(map);
        let markers = {};

        // カスタムアイコンを作成する関数（特別ピンとお店ピンを作り分け）
        function createCustomIcon(colorClass, isSpecial = false, emoji = "") {
            let colorHex = "#ec4899"; // default (rose-500)
            if(colorClass.includes("amber")) colorHex = "#f59e0b";
            if(colorClass.includes("orange")) colorHex = "#f97316";
            if(colorClass.includes("yellow")) colorHex = "#ca8a04";
            if(colorClass.includes("red")) colorHex = "#dc2626";
            if(colorClass.includes("indigo")) colorHex = "#4f46e5"; // 会場
            if(colorClass.includes("teal")) colorHex = "#0d9488"; // ホテル

            if (isSpecial) {
                // 特別ピン (丸型で絵文字入り)
                const html = `
                    <div class="pulse-pin" style="background-color: ${colorHex}; width: 32px; height: 32px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-size: 16px;">
                        ${emoji}
                    </div>
                    <div style="width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 8px solid ${colorHex}; margin: -1px auto 0;"></div>
                `;
                return L.divIcon({
                    className: "custom-pin",
                    html: html,
                    iconSize: [32, 40],
                    iconAnchor: [16, 40],
                    popupAnchor: [0, -36]
                });
            } else {
                // お店ピン (SVG)
                const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="${colorHex}" width="36px" height="36px" stroke="#ffffff" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;
                return L.divIcon({
                    className: "custom-pin",
                    html: svgIcon,
                    iconSize: [36, 36],
                    iconAnchor: [18, 36],
                    popupAnchor: [0, -32]
                });
            }
        }

        // ----------------------------------------------------
        // 3. UIの生成と描画関数
        // ----------------------------------------------------
        const grid = document.getElementById('restaurant-grid');

        const getEmoji = (cat) => {
            if(cat === 'ペーパーチキン') return '🍗';
            if(cat === 'ラクサ') return '🍜';
            if(cat === 'バクテー') return '🍲';
            if(cat === 'チリクラブ') return '🦀';
            return '🍽️';
        }

        // 地図とリストを再描画する関数
        function renderItems(categoryFilter) {
            // 表示をクリア
            markerLayerGroup.clearLayers();
            grid.innerHTML = '';
            markers = {};
            const allBoundsObj = []; // ズーム調整用

            // 【1】拠点（ホテル・会場）はフィルターに関係なく常に描画
            basePlaces.forEach(base => {
                const marker = L.marker([base.lat, base.lng], { icon: createCustomIcon(base.color, true, base.iconEmoji) });
                
                const popupContent = `
                    <div class="p-1 min-w-[160px]">
                        <span class="text-xs font-bold text-white px-2 py-0.5 rounded-full ${base.color}">${base.type === 'event' ? 'カンファレンス' : 'ホテル'}</span>
                        <h3 class="font-bold text-base mt-2 leading-tight">${base.name}</h3>
                        <p class="text-xs text-slate-600 font-medium mt-1 mb-2">${base.desc}<br><span class="text-[10px] text-slate-400">${base.address}</span></p>
                        <a href="${base.link}" target="_blank" rel="noopener noreferrer" class="text-xs text-blue-600 hover:text-blue-800 underline flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            Google Mapで開く
                        </a>
                    </div>
                `;
                marker.bindPopup(popupContent);
                markerLayerGroup.addLayer(marker);
                allBoundsObj.push(marker); // ズーム計算に追加
            });

            // 【2】グルメ情報のフィルタリングと描画
            const filteredPlaces = categoryFilter === 'all' 
                ? places 
                : places.filter(p => p.category === categoryFilter);

            // リスト上部の店舗数を更新
            const countSpan = document.querySelector('span.text-sm.text-slate-500.bg-slate-200');
            if(countSpan) countSpan.textContent = `全${filteredPlaces.length}店舗`;

            filteredPlaces.forEach(place => {
                // マーカーの追加
                const marker = L.marker([place.lat, place.lng], { icon: createCustomIcon(place.color) });
                
                // 星の生成
                const renderStars = (rating) => {
                    const fullStars = Math.floor(rating);
                    const hasHalfStar = rating % 1 !== 0;
                    let starsHtml = '';
                    for (let i = 0; i < fullStars; i++) starsHtml += '<span class="text-amber-400">★</span>';
                    if (hasHalfStar) starsHtml += '<span class="text-amber-400">★</span>'; // 簡易的に★で表現
                    const emptyStars = 5 - Math.ceil(rating);
                    for (let i = 0; i < emptyStars; i++) starsHtml += '<span class="text-slate-300">★</span>';
                    return starsHtml;
                };

                const popupContent = `
                    <div class="p-1 min-w-[150px]">
                        <span class="text-xs font-bold text-white px-2 py-0.5 rounded-full ${place.color}">${place.category}</span>
                        <h3 class="font-bold text-base mt-2 leading-tight">${place.name}</h3>
                        <div class="flex items-center gap-1 mt-1 text-xs">
                            <span class="font-bold text-amber-500">${place.rating}</span>
                            <div class="flex">${renderStars(place.rating)}</div>
                            <span class="text-slate-400">(${place.reviews.toLocaleString()})</span>
                        </div>
                        <p class="text-xs text-slate-500 mt-1 mb-2">予算: ${place.budget}</p>
                        <a href="${place.link}" target="_blank" rel="noopener noreferrer" class="text-xs text-blue-600 hover:text-blue-800 underline flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            Google Mapで見る
                        </a>
                    </div>
                `;
                marker.bindPopup(popupContent);
                markerLayerGroup.addLayer(marker);
                markers[place.id] = marker;
                allBoundsObj.push(marker); // ズーム計算に追加

                // リスト用カード要素の作成 (写真なしのシンプル版)
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm hover:shadow-md transition-all duration-300 overflow-hidden border border-slate-200 flex flex-col cursor-pointer border-l-4";
                
                // 左側のボーダー色をカテゴリに合わせる
                let borderColorClass = "border-l-rose-500";
                if(place.color.includes("amber")) borderColorClass = "border-l-amber-500";
                if(place.color.includes("orange")) borderColorClass = "border-l-orange-500";
                if(place.color.includes("yellow")) borderColorClass = "border-l-yellow-500";
                if(place.color.includes("red")) borderColorClass = "border-l-red-500";
                card.classList.add(borderColorClass);

                card.onclick = () => {
                    map.flyTo([place.lat, place.lng], 16, { duration: 1.0 });
                    setTimeout(() => {
                        markers[place.id].openPopup();
                    }, 800);
                    window.scrollTo({
                        top: document.getElementById('map').offsetTop - 20,
                        behavior: 'smooth'
                    });
                };

                card.innerHTML = `
                    <div class="p-5 flex-grow flex flex-col">
                        <div class="flex items-start justify-between mb-2">
                            <h3 class="text-lg font-bold text-slate-800 leading-tight">${place.name}</h3>
                            <span class="${place.color} text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm whitespace-nowrap ml-2">
                                ${getEmoji(place.category)} ${place.category}
                            </span>
                        </div>
                        <div class="flex items-center gap-1.5 mb-2 text-sm">
                            <span class="font-bold text-amber-500">${place.rating}</span>
                            <div class="flex text-xs">${renderStars(place.rating)}</div>
                            <span class="text-slate-400 text-xs">(${place.reviews.toLocaleString()}件)</span>
                        </div>
                        <p class="text-sm text-slate-600 mb-4 flex-grow">${place.desc}</p>
                        
                        <div class="flex items-center justify-between border-t border-slate-100 pt-3 mt-auto">
                            <div class="flex items-center gap-1.5 text-slate-600">
                                <span class="text-sm">💰</span>
                                <span class="text-xs font-medium">${place.budget}</span>
                            </div>
                            <a href="${place.link}" target="_blank" rel="noopener noreferrer" 
                               class="text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-md transition-colors flex items-center gap-1"
                               onclick="event.stopPropagation();">
                                📍 Map
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // ホテル・会場・グルメすべてが収まるように地図のズームを調整
            if (allBoundsObj.length > 0) {
                const group = new L.featureGroup(allBoundsObj);
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        // ----------------------------------------------------
        // 4. イベントリスナー (フィルターボタン)
        // ----------------------------------------------------
        const filterButtons = document.querySelectorAll('.filter-btn');
        filterButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterButtons.forEach(b => {
                    b.classList.remove('bg-slate-800', 'text-white');
                    b.classList.add('bg-white', 'text-slate-600');
                });
                
                e.currentTarget.classList.remove('bg-white', 'text-slate-600');
                e.currentTarget.classList.add('bg-slate-800', 'text-white');

                const category = e.currentTarget.getAttribute('data-category');
                renderItems(category);
            });
        });

        // 初回読み込み時にすべてを描画
        renderItems('all');

    </script>
</body>
</html>
